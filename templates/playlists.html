{{define "content"}}
<table>
  <tr>
    <th class="p-4">Name</th>
    <th class="p-4">ID</th>
    <th class="p-4">Link</th>
  </tr>
  {{range .Playlists}}
  <tr>
    <td class="px-4"><img src="{{ .CoverUrl }}" alt="{{ .Id }} cover" width="100px"></td>
    <td class="px-4">{{ .Name }}</td>
    <td class="px-4">{{ .Id }}</td>
  </tr>
  {{else}}
  <div><strong>no rows</strong></div>
  {{end}}
</table>
{{end}}
